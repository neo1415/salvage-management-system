name: Security checks

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  secrets-and-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run security:scan
      - run: npm audit --omit=dev --audit-level=high
      - run: npm ci --prefix socket-sidecar
      - run: npm audit --prefix socket-sidecar --omit=dev --audit-level=high
      - run: npm run build --prefix socket-sidecar
