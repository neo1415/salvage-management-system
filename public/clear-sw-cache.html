<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Service Worker Cache</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      background: #0070f3;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover {
      background: #0051cc;
    }
    .success {
      color: #0070f3;
      margin-top: 20px;
      padding: 10px;
      background: #e6f7ff;
      border-radius: 4px;
    }
    .error {
      color: #d32f2f;
      margin-top: 20px;
      padding: 10px;
      background: #ffebee;
      border-radius: 4px;
    }
    #status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔧 Service Worker Cache Cleaner</h1>
    <p>This tool will help you clear the service worker cache and force an update.</p>
    
    <button onclick="clearAllCaches()">Clear All Caches</button>
    <button onclick="unregisterServiceWorker()">Unregister Service Worker</button>
    <button onclick="doFullReset()">Full Reset (Recommended)</button>
    
    <div id="status"></div>
  </div>

  <script>
    const status = document.getElementById('status');

    async function clearAllCaches() {
      try {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        status.className = 'success';
        status.textContent = `✅ Cleared ${cacheNames.length} cache(s): ${cacheNames.join(', ')}`;
      } catch (error) {
        status.className = 'error';
        status.textContent = `❌ Error clearing caches: ${error.message}`;
      }
    }

    async function unregisterServiceWorker() {
      try {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(reg => reg.unregister()));
        status.className = 'success';
        status.textContent = `✅ Unregistered ${registrations.length} service worker(s)`;
      } catch (error) {
        status.className = 'error';
        status.textContent = `❌ Error unregistering service worker: ${error.message}`;
      }
    }

    async function doFullReset() {
      try {
        // Clear all caches
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        
        // Unregister all service workers
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(reg => reg.unregister()));
        
        status.className = 'success';
        status.innerHTML = `
          ✅ Full reset complete!<br>
          - Cleared ${cacheNames.length} cache(s)<br>
          - Unregistered ${registrations.length} service worker(s)<br>
          <br>
          <strong>Next steps:</strong><br>
          1. Close this tab<br>
          2. Close ALL other tabs of this site<br>
          3. Restart your browser<br>
          4. Visit the site again
        `;
      } catch (error) {
        status.className = 'error';
        status.textContent = `❌ Error during full reset: ${error.message}`;
      }
    }
  </script>
</body>
</html>
