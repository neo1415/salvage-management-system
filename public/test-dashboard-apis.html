<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence Dashboard API Tester</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #800020 0%, #600018 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .controls {
      padding: 20px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      font-weight: 600;
      font-size: 14px;
      color: #495057;
    }

    .controls input {
      padding: 8px 12px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 14px;
      flex: 1;
      min-width: 200px;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #800020;
      color: white;
    }

    .btn-primary:hover {
      background: #600018;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(128, 0, 32, 0.3);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    .content {
      padding: 30px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .summary-card.success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }

    .summary-card.warning {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .summary-card.error {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    }

    .summary-card h3 {
      font-size: 32px;
      margin-bottom: 5px;
    }

    .summary-card p {
      font-size: 14px;
      opacity: 0.9;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .results-table thead {
      background: #800020;
      color: white;
    }

    .results-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
    }

    .results-table td {
      padding: 15px;
      border-bottom: 1px solid #dee2e6;
      font-size: 14px;
    }

    .results-table tbody tr:hover {
      background: #f8f9fa;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-success {
      background: #d4edda;
      color: #155724;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
    }

    .status-warning {
      background: #fff3cd;
      color: #856404;
    }

    .data-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #d1ecf1;
      color: #0c5460;
    }

    .expand-btn {
      background: none;
      border: none;
      color: #800020;
      cursor: pointer;
      font-size: 12px;
      text-decoration: underline;
      padding: 0;
    }

    .expand-btn:hover {
      color: #600018;
    }

    .details {
      margin-top: 10px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 400px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #6c757d;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #800020;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .issues {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 20px;
      margin-top: 20px;
      border-radius: 6px;
    }

    .issues h3 {
      color: #856404;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .issues ul {
      list-style: none;
      padding: 0;
    }

    .issues li {
      padding: 8px 0;
      color: #856404;
      font-size: 14px;
    }

    .issues li::before {
      content: "⚠️ ";
      margin-right: 8px;
    }

    .recommendations {
      background: #d1ecf1;
      border-left: 4px solid #17a2b8;
      padding: 20px;
      margin-top: 20px;
      border-radius: 6px;
    }

    .recommendations h3 {
      color: #0c5460;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .recommendations ol {
      padding-left: 20px;
      color: #0c5460;
    }

    .recommendations li {
      padding: 8px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Intelligence Dashboard API Tester</h1>
      <p>Test all 7 analytics endpoints with real authentication to diagnose "No data available" issues</p>
    </div>

    <div class="controls">
      <label>Start Date:</label>
      <input type="datetime-local" id="startDate" />
      
      <label>End Date:</label>
      <input type="datetime-local" id="endDate" />
      
      <button class="btn btn-primary" id="testBtn" onclick="runTests()">
        <span>▶</span> Run All Tests
      </button>
      
      <button class="btn btn-secondary" onclick="clearResults()">
        <span>🗑️</span> Clear
      </button>
    </div>

    <div class="content">
      <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Testing endpoints...</p>
      </div>

      <div id="summary" style="display: none;">
        <div class="summary">
          <div class="summary-card">
            <h3 id="totalCount">0</h3>
            <p>Total Endpoints</p>
          </div>
          <div class="summary-card success">
            <h3 id="successCount">0</h3>
            <p>Successful (2xx)</p>
          </div>
          <div class="summary-card warning">
            <h3 id="dataCount">0</h3>
            <p>With Data</p>
          </div>
          <div class="summary-card error">
            <h3 id="errorCount">0</h3>
            <p>Failed</p>
          </div>
        </div>
      </div>

      <div id="results"></div>
      <div id="issues"></div>
      <div id="recommendations"></div>
    </div>
  </div>

  <script>
    // Initialize date inputs with last 30 days
    const now = new Date();
    const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
    
    document.getElementById('startDate').value = formatDateTimeLocal(thirtyDaysAgo);
    document.getElementById('endDate').value = formatDateTimeLocal(now);

    function formatDateTimeLocal(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    const endpoints = [
      '/api/intelligence/analytics/asset-performance',
      '/api/intelligence/analytics/attribute-performance',
      '/api/intelligence/analytics/temporal-patterns',
      '/api/intelligence/analytics/geographic-patterns',
      '/api/intelligence/analytics/vendor-segments',
      '/api/intelligence/analytics/conversion-funnel',
      '/api/intelligence/analytics/session-metrics',
    ];

    async function runTests() {
      const startDate = new Date(document.getElementById('startDate').value).toISOString();
      const endDate = new Date(document.getElementById('endDate').value).toISOString();
      
      const queryParams = new URLSearchParams({
        startDate,
        endDate,
        limit: '50',
      }).toString();

      document.getElementById('loading').style.display = 'block';
      document.getElementById('summary').style.display = 'none';
      document.getElementById('results').innerHTML = '';
      document.getElementById('issues').innerHTML = '';
      document.getElementById('recommendations').innerHTML = '';
      document.getElementById('testBtn').disabled = true;

      const results = [];

      for (const endpoint of endpoints) {
        const result = await testEndpoint(endpoint, queryParams);
        results.push(result);
      }

      displayResults(results);
      analyzeIssues(results);
      showRecommendations(results);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('summary').style.display = 'block';
      document.getElementById('testBtn').disabled = false;
    }

    async function testEndpoint(endpoint, queryParams) {
      const url = `${endpoint}?${queryParams}`;
      
      try {
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include', // Include cookies for authentication
        });

        const status = response.status;
        const statusText = response.statusText;
        
        let responseBody;
        let hasData = false;
        let dataCount = 0;
        let dataStructure = [];

        try {
          responseBody = await response.json();
          
          if (responseBody.data) {
            hasData = true;
            
            if (Array.isArray(responseBody.data)) {
              dataCount = responseBody.data.length;
              if (dataCount > 0) {
                dataStructure = Object.keys(responseBody.data[0]);
              }
            } else if (typeof responseBody.data === 'object' && responseBody.data !== null) {
              dataCount = 1;
              dataStructure = Object.keys(responseBody.data);
            }
          }
        } catch (parseError) {
          responseBody = { error: 'Failed to parse response', details: parseError.message };
        }

        return {
          endpoint,
          status,
          statusText,
          success: response.ok,
          hasData,
          dataCount,
          dataStructure,
          responseBody,
        };

      } catch (error) {
        return {
          endpoint,
          status: 0,
          statusText: 'Request Failed',
          success: false,
          hasData: false,
          dataCount: 0,
          dataStructure: [],
          responseBody: null,
          error: error.message,
        };
      }
    }

    function displayResults(results) {
      const totalCount = results.length;
      const successCount = results.filter(r => r.success).length;
      const dataCount = results.filter(r => r.hasData).length;
      const errorCount = results.filter(r => !r.success).length;

      document.getElementById('totalCount').textContent = totalCount;
      document.getElementById('successCount').textContent = successCount;
      document.getElementById('dataCount').textContent = dataCount;
      document.getElementById('errorCount').textContent = errorCount;

      const table = document.createElement('table');
      table.className = 'results-table';
      
      table.innerHTML = `
        <thead>
          <tr>
            <th>Endpoint</th>
            <th>Status</th>
            <th>Has Data</th>
            <th>Count</th>
            <th>Fields</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${results.map((result, index) => `
            <tr>
              <td><strong>${result.endpoint}</strong></td>
              <td>
                <span class="status-badge ${result.success ? 'status-success' : 'status-error'}">
                  ${result.status} ${result.statusText}
                </span>
              </td>
              <td>
                ${result.hasData 
                  ? '<span class="status-badge status-success">✓ Yes</span>' 
                  : '<span class="status-badge status-error">✗ No</span>'}
              </td>
              <td>
                ${result.hasData ? `<span class="data-badge">${result.dataCount} items</span>` : '-'}
              </td>
              <td>
                ${result.dataStructure.length > 0 
                  ? result.dataStructure.slice(0, 3).join(', ') + (result.dataStructure.length > 3 ? '...' : '')
                  : '-'}
              </td>
              <td>
                <button class="expand-btn" onclick="toggleDetails(${index})">
                  View Details
                </button>
              </td>
            </tr>
            <tr id="details-${index}" style="display: none;">
              <td colspan="6">
                <div class="details">${JSON.stringify(result.responseBody, null, 2)}</div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      `;

      document.getElementById('results').appendChild(table);
    }

    function toggleDetails(index) {
      const detailsRow = document.getElementById(`details-${index}`);
      detailsRow.style.display = detailsRow.style.display === 'none' ? 'table-row' : 'none';
    }

    function analyzeIssues(results) {
      const issues = [];

      const authIssues = results.filter(r => r.status === 401);
      if (authIssues.length > 0) {
        issues.push(`${authIssues.length} endpoint(s) returned 401 Unauthorized - You need to log in first`);
      }

      const forbiddenIssues = results.filter(r => r.status === 403);
      if (forbiddenIssues.length > 0) {
        issues.push(`${forbiddenIssues.length} endpoint(s) returned 403 Forbidden - User may not have admin/manager role`);
      }

      const emptyDataIssues = results.filter(r => r.success && !r.hasData);
      if (emptyDataIssues.length > 0) {
        issues.push(`${emptyDataIssues.length} endpoint(s) returned success but no data - Database may be empty`);
        emptyDataIssues.forEach(r => {
          issues.push(`  → ${r.endpoint}: Response keys: ${Object.keys(r.responseBody || {}).join(', ')}`);
        });
      }

      const serverErrors = results.filter(r => r.status >= 500);
      if (serverErrors.length > 0) {
        issues.push(`${serverErrors.length} endpoint(s) returned server errors (5xx)`);
      }

      if (issues.length > 0) {
        const issuesDiv = document.createElement('div');
        issuesDiv.className = 'issues';
        issuesDiv.innerHTML = `
          <h3>⚠️ Issues Detected</h3>
          <ul>
            ${issues.map(issue => `<li>${issue}</li>`).join('')}
          </ul>
        `;
        document.getElementById('issues').appendChild(issuesDiv);
      }
    }

    function showRecommendations(results) {
      const recommendations = [];

      const hasAuthIssues = results.some(r => r.status === 401);
      if (hasAuthIssues) {
        recommendations.push('Log in to the application first, then run this test again');
      }

      const hasForbiddenIssues = results.some(r => r.status === 403);
      if (hasForbiddenIssues) {
        recommendations.push('Ensure you are logged in as an admin or manager user');
      }

      const hasEmptyData = results.some(r => r.success && !r.hasData);
      if (hasEmptyData) {
        recommendations.push('Check if the database has data for the selected date range');
        recommendations.push('Run population scripts to add test data');
      }

      const allSuccessWithData = results.every(r => r.success && r.hasData);
      if (allSuccessWithData) {
        recommendations.push('All APIs are working! If UI still shows "No data available", check:');
        recommendations.push('  → Browser console for JavaScript errors (F12 → Console)');
        recommendations.push('  → Network tab for failed requests (F12 → Network)');
        recommendations.push('  → React component state management');
        recommendations.push('  → Data transformation logic in the UI');
      }

      if (recommendations.length > 0) {
        const recDiv = document.createElement('div');
        recDiv.className = 'recommendations';
        recDiv.innerHTML = `
          <h3>💡 Recommendations</h3>
          <ol>
            ${recommendations.map(rec => `<li>${rec}</li>`).join('')}
          </ol>
        `;
        document.getElementById('recommendations').appendChild(recDiv);
      }
    }

    function clearResults() {
      document.getElementById('summary').style.display = 'none';
      document.getElementById('results').innerHTML = '';
      document.getElementById('issues').innerHTML = '';
      document.getElementById('recommendations').innerHTML = '';
    }
  </script>
</body>
</html>
